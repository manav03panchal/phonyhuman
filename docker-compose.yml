# docker-compose.yml — Symphony (phonyhuman) orchestrator
#
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker-compose up -d
#
# The orchestrator reads its configuration from WORKFLOW.md, which must be
# mounted into the container.  Environment variables referenced inside
# WORKFLOW.md (e.g. $LINEAR_API_KEY) are passed through via the env_file.
#
# SECURITY: Secrets (LINEAR_API_KEY, SECRET_KEY_BASE) are passed as environment
# variables below for development convenience. For production deployments, use
# Docker secrets (https://docs.docker.com/compose/how-tos/use-secrets/) or an
# external secrets manager (e.g. Vault, AWS Secrets Manager) instead of
# plaintext environment variables.

services:
  orchestrator:
    build:
      context: ./elixir
      dockerfile: Dockerfile
    image: phonyhuman:latest
    container_name: phonyhuman
    restart: unless-stopped
    ports:
      - "${SYMPHONY_PORT:-4000}:4000"
    env_file:
      - path: .env
        required: false
    environment:
      - LINEAR_API_KEY
      - SECRET_KEY_BASE
      - SOURCE_REPO_URL
      - LINEAR_ASSIGNEE
      - PHI_LOG_LEVEL
      - SSH_AUTH_SOCK=/run/ssh-agent/ssh-auth.sock
      # Git identity (avoids mounting host .gitconfig which may contain tokens)
      - GIT_AUTHOR_NAME
      - GIT_AUTHOR_EMAIL
      - GIT_COMMITTER_NAME
      - GIT_COMMITTER_EMAIL
    volumes:
      # Workflow configuration (required)
      - ./WORKFLOW.md:/etc/symphony/WORKFLOW.md:ro
      # Persistent workspaces survive container restarts
      - symphony_workspaces:/var/symphony/workspaces
      # Logs
      - symphony_logs:/var/log/symphony
      # Git credentials – forward host SSH agent (never mount private keys)
      - ${SSH_AUTH_SOCK:-/dev/null}:/run/ssh-agent/ssh-auth.sock:ro
      - ${HOME}/.ssh/known_hosts:/home/symphony/.ssh/known_hosts:ro
      # Optional: mount claude CLI binary from host
      # - /usr/local/bin/claude:/usr/local/bin/claude:ro
      # Optional: mount gh CLI binary from host
      # - /usr/local/bin/gh:/usr/local/bin/gh:ro
      # Optional: mount pre-built TUI binary from host
      # - ./bin/symphony-tui:/usr/local/bin/symphony-tui:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  symphony_workspaces:
  symphony_logs:
