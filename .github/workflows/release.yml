name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: phonyhuman ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            platform: linux-x86_64
          - goos: darwin
            goarch: amd64
            platform: darwin-x86_64
          - goos: darwin
            goarch: arm64
            platform: darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir + OTP 28
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Cache Elixir dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.hex
            ~/.mix
            elixir/deps
            elixir/_build
          key: elixir-${{ runner.os }}-otp28-elixir1.19-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            elixir-${{ runner.os }}-otp28-elixir1.19-

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: tui/go.sum

      - name: Build escript
        working-directory: elixir
        run: |
          mix local.hex --force --if-missing
          mix local.rebar --force --if-missing
          mix setup
          mix build

      - name: Build TUI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cd tui && go build \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}" \
            -o ../bin/symphony-tui .

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      - name: Create templates directory
        run: mkdir -p templates

      - name: Copy example.toml to templates
        run: cp example.toml templates/example.toml

      - name: Package tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          STAGING="phonyhuman-${VERSION}"
          mkdir -p "$STAGING/bin" "$STAGING/templates"

          # CLI wrapper
          cp bin/phonyhuman "$STAGING/bin/phonyhuman"
          chmod +x "$STAGING/bin/phonyhuman"

          # Elixir escript (renamed to avoid collision)
          cp elixir/bin/symphony "$STAGING/bin/symphony-escript"
          chmod +x "$STAGING/bin/symphony-escript"

          # TUI binary (platform-specific)
          cp bin/symphony-tui "$STAGING/bin/symphony-tui"
          chmod +x "$STAGING/bin/symphony-tui"

          # Python scripts
          cp claude-shim.py "$STAGING/bin/claude-shim.py"
          cp linear-cli.py "$STAGING/bin/linear-cli.py"

          # Template
          cp example.toml "$STAGING/templates/example.toml"
          cp templates/default-prompt.md "$STAGING/templates/default-prompt.md"

          # Skills
          cp -r skills "$STAGING/skills"

          # mise config for Erlang
          cat > "$STAGING/.mise.toml" <<EOF
          [tools]
          erlang = "28"
          EOF

          # Version file
          echo "$VERSION" > "$STAGING/version"

          # Create platform-specific tarball
          TARBALL="phonyhuman-${VERSION}-${PLATFORM}.tar.gz"
          tar czf "$TARBALL" \
            -C "$STAGING" \
            bin/ templates/ skills/ .mise.toml version

          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: ${{ env.TARBALL }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-checksums:
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      - name: Download all release tarballs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tarballs
          gh release download "${{ steps.version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.tar.gz" \
            --dir tarballs

      - name: Generate checksums
        run: |
          cd tarballs
          sha256sum *.tar.gz | sort > ../checksums.txt
          echo "Generated checksums:"
          cat ../checksums.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
