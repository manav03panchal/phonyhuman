name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@26e8ad27a09a225049a7075d7ec1caa2df6ff332 # v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: phonyhuman ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            platform: linux-x86_64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            platform: darwin-x86_64
            runner: macos-14
          - goos: darwin
            goarch: arm64
            platform: darwin-arm64
            runner: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Elixir + OTP 28
        uses: erlef/setup-beam@9d5b75ddfda22fb979d2270283237aef8aa68d6b # v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Cache Elixir dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.hex
            ~/.mix
            elixir/deps
            elixir/_build
          key: elixir-${{ runner.os }}-otp28-elixir1.19-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            elixir-${{ runner.os }}-otp28-elixir1.19-

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.24"
          cache-dependency-path: tui/go.sum

      - name: Build escript
        working-directory: elixir
        run: |
          mix local.hex --force --if-missing
          mix local.rebar --force --if-missing
          mix setup
          mix build

      - name: Build TUI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cd tui && go build \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}" \
            -o ../bin/symphony-tui .

      - name: Verify escript
        working-directory: elixir
        run: |
          echo "Verifying escript binary..."
          test -s bin/symphony || { echo "::error::Escript binary missing or empty"; exit 1; }
          head -1 bin/symphony | grep -q escript || { echo "::error::Not a valid escript"; exit 1; }
          echo "Escript verification passed"

      - name: Verify TUI binary
        run: |
          echo "Verifying TUI binary..."
          test -s bin/symphony-tui || { echo "::error::TUI binary missing or empty"; exit 1; }

          FILE_INFO="$(file bin/symphony-tui)"
          echo "Binary: $FILE_INFO"

          case "${{ matrix.platform }}" in
            linux-x86_64)
              echo "$FILE_INFO" | grep -q "ELF.*x86-64" || { echo "::error::Expected Linux x86_64 binary"; exit 1; }
              ./bin/symphony-tui --version
              ;;
            darwin-x86_64)
              echo "$FILE_INFO" | grep -q "Mach-O.*x86_64" || { echo "::error::Expected macOS x86_64 binary"; exit 1; }
              # Cross-compiled binary — skip execution test on arm64 runner
              ;;
            darwin-arm64)
              echo "$FILE_INFO" | grep -q "Mach-O.*arm64" || { echo "::error::Expected macOS arm64 binary"; exit 1; }
              ./bin/symphony-tui --version
              ;;
          esac

          echo "TUI binary verification passed for ${{ matrix.platform }}"

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      - name: Create templates directory
        run: mkdir -p templates

      - name: Copy example.toml to templates
        run: cp example.toml templates/example.toml

      - name: Package tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          STAGING="phonyhuman-${VERSION}"
          mkdir -p "$STAGING/bin" "$STAGING/templates"

          # CLI wrapper
          cp bin/phonyhuman "$STAGING/bin/phonyhuman"
          chmod +x "$STAGING/bin/phonyhuman"

          # Elixir escript (renamed to avoid collision)
          cp elixir/bin/symphony "$STAGING/bin/symphony-escript"
          chmod +x "$STAGING/bin/symphony-escript"

          # TUI binary (platform-specific)
          cp bin/symphony-tui "$STAGING/bin/symphony-tui"
          chmod +x "$STAGING/bin/symphony-tui"

          # Python scripts
          cp claude-shim.py "$STAGING/bin/claude-shim.py"
          cp linear-cli.py "$STAGING/bin/linear-cli.py"

          # Template
          cp example.toml "$STAGING/templates/example.toml"
          cp templates/default-prompt.md "$STAGING/templates/default-prompt.md"

          # Skills
          cp -r skills "$STAGING/skills"

          # mise config for Erlang
          cat > "$STAGING/.mise.toml" <<EOF
          [tools]
          erlang = "28"
          EOF

          # Version file
          echo "$VERSION" > "$STAGING/version"

          # Create platform-specific tarball
          TARBALL="phonyhuman-${VERSION}-${PLATFORM}.tar.gz"
          tar czf "$TARBALL" \
            -C "$STAGING" \
            bin/ templates/ skills/ .mise.toml version

          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Generate local checksum
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum "$TARBALL" > "${TARBALL}.sha256"
          else
            shasum -a 256 "$TARBALL" > "${TARBALL}.sha256"
          fi

      - name: Upload checksum artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: checksum-${{ matrix.platform }}
          path: ${{ env.TARBALL }}.sha256

      - name: Upload release asset
        uses: softprops/action-gh-release@26e8ad27a09a225049a7075d7ec1caa2df6ff332 # v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: ${{ env.TARBALL }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-checksums:
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      - name: Download checksum artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: checksum-*
          path: checksums

      - name: Assemble checksums
        run: |
          cat checksums/checksum-*/*.sha256 | sort > checksums.txt
          echo "Generated checksums:"
          cat checksums.txt

      - name: Check GPG key availability
        id: gpg-check
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GPG_PRIVATE_KEY not set — skipping signature"
          fi
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Import GPG signing key
        if: steps.gpg-check.outputs.available == 'true'
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Sign checksums with GPG
        if: steps.gpg-check.outputs.available == 'true'
        run: |
          echo "::add-mask::$GPG_PASSPHRASE"
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --detach-sign --armor checksums.txt
          echo "Generated signature:"
          ls -la checksums.txt.asc
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Upload checksums and signature
        uses: softprops/action-gh-release@26e8ad27a09a225049a7075d7ec1caa2df6ff332 # v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            checksums.txt
            checksums.txt.asc
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
